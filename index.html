<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Knightly Tasks</title>
<style>
/* ====================================================
   BASE
   ==================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #2d1a00;
  --gold:      #c8a043;
  --gold-dim:  rgba(139,100,30,0.6);
  --parchment: rgba(245,230,190,0.08);
  --panel-bg:  rgba(20,12,4,0.82);
  --cb-border: rgba(120,80,20,0.75);
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: #0a0704;
  -webkit-tap-highlight-color: transparent;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* ====================================================
   APP CONTAINER
   ==================================================== */
#app {
  position: relative;
  width: 100%;
  max-width: 480px;
  height: 100dvh;           /* dynamic viewport height — handles browser chrome */
  height: 100vh;            /* fallback */
  overflow: hidden;
}

/* ====================================================
   SCREENS
   ==================================================== */
.screen {
  position: absolute;
  inset: 0;
  display: none !important;
  background-size: cover;
  background-position: top center;
  background-repeat: no-repeat;
}
.screen.active { display: block !important; }
.screen.active.placeholder { display: flex !important; }

/* Slide transition */
@keyframes slideInRight { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
@keyframes slideInLeft  { from { opacity:0; transform:translateX(-24px); } to { opacity:1; transform:translateX(0); } }
.anim-right { animation: slideInRight 0.25s ease forwards; }
.anim-left  { animation: slideInLeft  0.25s ease forwards; }

/* Background images — rename your files to match these names */
#screen-menu      { background-image: url('bg-menu.png');      }
#screen-monday    { background-image: url('bg-monday.png');    }
#screen-tuesday   { background-image: url('bg-tuesday.png');   }
#screen-wednesday { background-image: url('bg-wednesday.png'); }
#screen-thursday  { background-image: url('bg-thursday.png');  }
#screen-friday    { background-image: url('bg-friday.png');    }
#screen-saturday  { background-image: url('bg-saturday.png');  }
#screen-sunday    { background-image: url('bg-sunday.png');    }

/* ====================================================
   MENU BUTTONS (invisible hit areas over the image rows)
   Adjust top/height percentages if your image crops differently.
   ==================================================== */
.menu-hit {
  position: absolute;
  left: 0; width: 100%;
  background: transparent;
  border: none;
  cursor: pointer;
  -webkit-appearance: none;
}

/* ====================================================
   WEEK NAV BAR (appears on menu + day screens)
   ==================================================== */
.week-bar {
  position: absolute;
  top: env(safe-area-inset-top, 6px);
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  z-index: 30;
  padding-top: 6px;
}
.week-bar button {
  background: var(--panel-bg);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  width: 30px; height: 30px;
  border-radius: 5px;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-appearance: none;
}
.week-bar button:active { background: rgba(200,160,67,0.2); }
#week-label, .day-week-label {
  background: var(--panel-bg);
  color: var(--gold);
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--gold-dim);
  white-space: nowrap;
}

/* ====================================================
   BACK / CORNER BUTTONS
   ==================================================== */
.back-btn {
  position: absolute;
  z-index: 30;
  background: var(--panel-bg);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 12px;
  padding: 5px 11px;
  border-radius: 5px;
  cursor: pointer;
  -webkit-appearance: none;
}
.back-btn:active { background: rgba(200,160,67,0.2); }

.day-back  { top: calc(env(safe-area-inset-top, 6px) + 6px); left: 10px; }
.day-extra { top: calc(env(safe-area-inset-top, 6px) + 6px); right: 10px; }

/* ====================================================
   DAY SCREEN INTERACTIVE ELEMENTS
   
   Positions are % of viewport height (vh).
   ⚙️  TWEAK GUIDE: If elements are misaligned on your phone,
       change the --row-* variables at the top of your screen's
       JS entry in buildDayScreen() or adjust these directly.
   ==================================================== */

/* Task rows */
.task-row {
  position: absolute;
  display: flex;
  align-items: center;
  left: 3%;
  width: 90%;
  /* height set inline per row */
}

/* Custom checkbox */
.cb {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border: 2px solid var(--cb-border);
  border-radius: 3px;
  background: transparent;
  margin-right: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.cb.on  { background: rgba(200,160,67,0.18); border-color: var(--gold); }
.cb.on::after { content: '✓'; color: var(--gold); font-size: 14px; font-weight: bold; line-height: 1; }

/* Text input over parchment */
.task-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(120,80,20,0.2);
  outline: none;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 14px;
  color: var(--ink);
  padding: 2px 4px;
  min-width: 0;
  -webkit-appearance: none;
}
.task-input.done { text-decoration: line-through; opacity: 0.45; }
.task-input::placeholder { color: rgba(80,50,10,0.35); font-style: italic; }

/* Notes / poem textareas */
.notes-ta, .poem-ta {
  position: absolute;
  left: 5%; width: 88%;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: Georgia, 'Times New Roman', serif;
  color: var(--ink);
  -webkit-appearance: none;
}
.notes-ta { font-size: 13px; line-height: 1.55; }
.poem-ta  { font-size: 13px; line-height: 1.55; font-style: italic; }
.notes-ta::placeholder, .poem-ta::placeholder { color: rgba(80,50,10,0.3); }

/* Tracker row (Training Grounds / The Void checkboxes at bottom of day screen) */
.tracker-row {
  position: absolute;
  display: flex; align-items: center;
  cursor: pointer;
  gap: 5px;
}
.tracker-cb {
  width: 17px; height: 17px;
  border: 2px solid rgba(200,160,67,0.75);
  border-radius: 3px;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.tracker-cb.on  { background: rgba(200,160,67,0.2); }
.tracker-cb.on::after { content:'✓'; color: var(--gold); font-size: 11px; font-weight: bold; }

/* ====================================================
   PLACEHOLDER / COMING SOON SCREENS
   ==================================================== */
.placeholder {
  background: radial-gradient(ellipse at 50% 30%, #2a1c0a 0%, #0d0804 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px;
}
.placeholder h2 {
  font-family: Georgia, 'Times New Roman', serif;
  color: var(--gold);
  font-size: 28px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.placeholder p {
  font-family: Georgia, 'Times New Roman', serif;
  color: rgba(200,160,67,0.5);
  font-size: 14px;
  letter-spacing: 0.05em;
}

/* ====================================================
   CALENDAR SCREEN
   ==================================================== */
#screen-calendar {
  background: radial-gradient(ellipse at 50% 20%, #1e1208 0%, #080502 100%);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.cal-inner {
  padding: 80px 20px 40px;
  display: flex; flex-direction: column; gap: 10px;
}
.cal-header {
  text-align: center;
  font-family: Georgia, 'Times New Roman', serif;
  color: var(--gold);
  font-size: 22px;
  margin-bottom: 6px;
}
.cal-week {
  background: rgba(139,100,30,0.12);
  border: 1px solid rgba(139,100,30,0.4);
  border-radius: 8px;
  padding: 13px 18px;
  cursor: pointer;
  font-family: Georgia, 'Times New Roman', serif;
  transition: background 0.15s;
}
.cal-week:active { background: rgba(139,100,30,0.3); }
.cal-week.this-week { border-color: var(--gold); }
.cal-week.selected  { box-shadow: 0 0 0 2px var(--gold); }
.cal-week-label { font-size: 15px; color: var(--gold); }
.cal-week-sub   { font-size: 11px; color: rgba(200,160,67,0.5); margin-top: 3px; }

/* ====================================================
   SCROLLBAR
   ==================================================== */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

<!-- ====================================================
     MAIN MENU
     ==================================================== -->
<div id="screen-menu" class="screen active">

  <!-- Week navigation -->
  <div class="week-bar">
    <button onclick="changeWeek(-1)" aria-label="Previous week">◀</button>
    <span id="week-label"></span>
    <button onclick="changeWeek(1)"  aria-label="Next week">▶</button>
  </div>

  <!--
    DAY ROW HIT AREAS
    These transparent buttons sit over each row in the menu image.
    Adjust top/height (%) if rows don't align on your device.
    The image rows span roughly 19%–81% of screen height.
    Each row is ~8.5% tall with small gaps.
  -->
  <button class="menu-hit" style="top:19%;  height:8.5%;" onclick="goDay('monday')"></button>
  <button class="menu-hit" style="top:28%;  height:8.5%;" onclick="goDay('tuesday')"></button>
  <button class="menu-hit" style="top:37%;  height:8.5%;" onclick="goDay('wednesday')"></button>
  <button class="menu-hit" style="top:46%;  height:8.5%;" onclick="goDay('thursday')"></button>
  <button class="menu-hit" style="top:55%;  height:8.5%;" onclick="goDay('friday')"></button>
  <button class="menu-hit" style="top:64%;  height:8.5%;" onclick="goLegacyDay()"></button>
  <button class="menu-hit" style="top:73%;  height:8%;"   onclick="goScreen('squire-tasks')"></button>

  <!-- Weekly Notes / Special Events buttons (lower parchment) -->
  <button class="menu-hit" style="top:83%;  height:5%;  left:8%; width:84%;" onclick="goScreen('weekly-notes')"></button>
  <button class="menu-hit" style="top:88.5%;height:4.5%;left:8%; width:84%;" onclick="goScreen('special-events')"></button>

  <!-- Bottom icon buttons: Training Grounds | The Void | Calendar -->
  <button style="position:absolute;bottom:0;left:0;   width:33%;height:9%;background:transparent;border:none;cursor:pointer;" onclick="goScreen('training-grounds')"></button>
  <button style="position:absolute;bottom:0;left:33%; width:34%;height:9%;background:transparent;border:none;cursor:pointer;" onclick="goScreen('void')"></button>
  <button style="position:absolute;bottom:0;right:0;  width:33%;height:9%;background:transparent;border:none;cursor:pointer;" onclick="goScreen('calendar')"></button>
</div>

<!-- ====================================================
     DAY SCREENS (built by JS)
     ==================================================== -->
<div id="screen-monday"    class="screen"></div>
<div id="screen-tuesday"   class="screen"></div>
<div id="screen-wednesday" class="screen"></div>
<div id="screen-thursday"  class="screen"></div>
<div id="screen-friday"    class="screen"></div>
<div id="screen-saturday"  class="screen"></div>
<div id="screen-sunday"    class="screen"></div>

<!-- ====================================================
     PLACEHOLDER SCREENS
     ==================================================== -->
<div id="screen-squire-tasks" class="screen placeholder">
  <button class="back-btn day-back" onclick="goScreen('menu')">← Menu</button>
  <h2>⚔️ Squire Tasks</h2>
  <p>Coming soon</p>
</div>

<div id="screen-training-grounds" class="screen placeholder">
  <button class="back-btn day-back" onclick="goScreen('menu')">← Menu</button>
  <h2>🛡️ Training Grounds</h2>
  <p>Coming soon</p>
</div>

<div id="screen-void" class="screen placeholder">
  <button class="back-btn day-back" onclick="goScreen('menu')">← Menu</button>
  <h2>⛵ The Void</h2>
  <p>Coming soon</p>
</div>

<div id="screen-weekly-notes" class="screen placeholder">
  <button class="back-btn day-back" onclick="goScreen('menu')">← Menu</button>
  <h2>📜 Weekly Notes</h2>
  <p>Coming soon</p>
</div>

<div id="screen-special-events" class="screen placeholder">
  <button class="back-btn day-back" onclick="goScreen('menu')">← Menu</button>
  <h2>🎪 Special Events</h2>
  <p>Coming soon</p>
</div>

<!-- ====================================================
     CALENDAR SCREEN
     ==================================================== -->
<div id="screen-calendar" class="screen">
  <!-- Fixed header -->
  <div style="position:sticky;top:0;z-index:20;background:rgba(8,5,2,0.95);padding:14px 16px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--gold-dim);">
    <button class="back-btn" style="position:static;" onclick="goScreen('menu')">← Menu</button>
    <span style="font-family:Georgia,serif;color:var(--gold);font-size:18px;letter-spacing:0.03em;">📅 Calendar</span>
  </div>
  <div class="cal-inner" id="cal-list"></div>
</div>

</div><!-- #app -->

<script>
/* ============================================================
   CONSTANTS
   ============================================================ */
const DAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];

const DAY_NAMES = {
  monday:    'Monday · Ink Day',
  tuesday:   'Tuesday · Lantern Day',
  wednesday: 'Wednesday · Forge Day',
  thursday:  'Thursday · Antler Day',
  friday:    'Friday · Fireside Day',
  saturday:  'Saturday · Legacy Day',
  sunday:    'Sunday · Legacy Day',
};

/*
  LAYOUT POSITIONS — all in vh (percent of viewport height).
  ⚙️  If things look off on your phone, tweak these numbers.
  The image fills the full height of the screen, so 50vh = 50% down the image.
*/
const LAYOUT = {
  mainRows:   [28, 35, 42],   // top (vh) for each of 3 main tasks
  squireRows: [54, 61, 68],   // top (vh) for each of 3 squire duties
  notesTop:   75.5,           // top of notes textarea (vh)
  notesH:     7.5,            // height of notes textarea (vh)
  trackerTop: 85.5,           // vertical position of tracker checkboxes (vh)
  poemTop:    92.5,           // top of poem textarea (vh)
  poemH:      6,              // height of poem textarea (vh)
  rowH:       5.5,            // height of each task row (vh)
};

/* ============================================================
   STATE
   ============================================================ */
let currentWeekKey = mondayKey(new Date());
let currentScreen  = 'menu';

/* ============================================================
   DATE UTILITIES
   ============================================================ */
function mondayKey(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  date.setHours(0, 0, 0, 0);
  return date.toISOString().slice(0, 10);
}

function keyToDate(key) {
  // Parse as local date (not UTC) to avoid timezone issues
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmtWeek(key) {
  const mon = keyToDate(key);
  const sun = new Date(mon);
  sun.setDate(sun.getDate() + 6);
  const opt = { month: 'short', day: 'numeric' };
  return `${mon.toLocaleDateString('en-CA', opt)} – ${sun.toLocaleDateString('en-CA', opt)}`;
}

/* ============================================================
   STORAGE
   ============================================================ */
function loadWeek(key) {
  try {
    const raw = localStorage.getItem('kt_week_' + key);
    return raw ? JSON.parse(raw) : freshWeek();
  } catch { return freshWeek(); }
}

function saveWeek(key, data) {
  try { localStorage.setItem('kt_week_' + key, JSON.stringify(data)); }
  catch (e) { console.warn('Save failed:', e); }
}

function freshDay() {
  return {
    mainText:     ['', '', ''],
    mainChecked:  [false, false, false],
    squireText:   ['', '', ''],
    squireChecked:[false, false, false],
    notes:        '',
    poem:         '',
    gym:          false,  // Training Grounds
    work:         false,  // The Void
  };
}

function freshWeek() {
  const w = {};
  DAYS.forEach(d => w[d] = freshDay());
  return w;
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function goScreen(id, dir = 'right') {
  if (id === currentScreen) return;

  // Save current day before leaving
  if (DAYS.includes(currentScreen)) flushDay(currentScreen);

  const prev = document.getElementById('screen-' + currentScreen);
  const next = document.getElementById('screen-' + id);

  if (prev) prev.classList.remove('active');

  currentScreen = id;

  if (!next) return;

  if (id === 'calendar') renderCalendar();

  next.classList.add('active');
  next.classList.remove('anim-right', 'anim-left');
  void next.offsetWidth; // force reflow
  next.classList.add(dir === 'right' ? 'anim-right' : 'anim-left');

  if (DAYS.includes(id)) loadDay(id);
}

function goDay(dayId) { goScreen(dayId, 'right'); }

function goLegacyDay() {
  // From menu, go to whichever legacy day matches today, or Saturday
  const today = new Date().getDay();
  goDay(today === 0 ? 'sunday' : 'saturday');
}

function changeWeek(dir) {
  if (DAYS.includes(currentScreen)) flushDay(currentScreen);

  const d = keyToDate(currentWeekKey);
  d.setDate(d.getDate() + dir * 7);
  currentWeekKey = d.toISOString().slice(0, 10);

  setWeekLabels();

  if (DAYS.includes(currentScreen)) loadDay(currentScreen);
}

function setWeekLabels() {
  const label = fmtWeek(currentWeekKey);
  const main = document.getElementById('week-label');
  if (main) main.textContent = label;
  // Update any visible day screen week label
  DAYS.forEach(d => {
    const el = document.getElementById(d + '-wklabel');
    if (el) el.textContent = label;
  });
}

/* ============================================================
   BUILD DAY SCREENS (called once at init)
   ============================================================ */
function buildDayScreen(dayId) {
  const el = document.getElementById('screen-' + dayId);
  const L = LAYOUT;

  let html = '';

  // Back button
  html += `<button class="back-btn day-back" onclick="goScreen('menu','left')">← Menu</button>`;

  // Week nav
  html += `
  <div class="week-bar">
    <button onclick="changeWeek(-1)">◀</button>
    <span id="${dayId}-wklabel" class="day-week-label"></span>
    <button onclick="changeWeek(1)">▶</button>
  </div>`;

  // Legacy day toggle
  if (dayId === 'saturday') {
    html += `<button class="back-btn day-extra" onclick="goDay('sunday')">Sunday →</button>`;
  } else if (dayId === 'sunday') {
    html += `<button class="back-btn day-extra" onclick="goDay('saturday')">← Saturday</button>`;
  }

  // Main Tasks rows
  L.mainRows.forEach((top, i) => {
    html += `
    <div class="task-row" id="${dayId}-mr${i}" style="top:${top}vh;height:${L.rowH}vh;">
      <div class="cb" id="${dayId}-mc${i}" onclick="toggleTask('${dayId}','main',${i})"></div>
      <input class="task-input" id="${dayId}-mt${i}" type="text" placeholder="Task..."
             oninput="queueSave('${dayId}')">
    </div>`;
  });

  // Squire Duties rows
  L.squireRows.forEach((top, i) => {
    html += `
    <div class="task-row" id="${dayId}-sr${i}" style="top:${top}vh;height:${L.rowH}vh;">
      <div class="cb" id="${dayId}-sc${i}" onclick="toggleTask('${dayId}','squire',${i})"></div>
      <input class="task-input" id="${dayId}-st${i}" type="text" placeholder="Task..."
             oninput="queueSave('${dayId}')">
    </div>`;
  });

  // Notes
  html += `
  <textarea class="notes-ta" id="${dayId}-notes"
    style="top:${L.notesTop}vh;height:${L.notesH}vh;"
    placeholder="Notes..." oninput="queueSave('${dayId}')"></textarea>`;

  // Tracker: Training Grounds (left) + The Void (right)
  html += `
  <div class="tracker-row" style="top:${L.trackerTop}vh;left:6%;" onclick="toggleTracker('${dayId}','gym')">
    <div class="tracker-cb" id="${dayId}-gym"></div>
  </div>
  <div class="tracker-row" style="top:${L.trackerTop}vh;left:52%;" onclick="toggleTracker('${dayId}','work')">
    <div class="tracker-cb" id="${dayId}-work"></div>
  </div>`;

  // Poem of the Day
  html += `
  <textarea class="poem-ta" id="${dayId}-poem"
    style="top:${L.poemTop}vh;height:${L.poemH}vh;"
    placeholder="Poem of the Day..." oninput="queueSave('${dayId}')"></textarea>`;

  el.innerHTML = html;
}

/* ============================================================
   LOAD / FLUSH DAY DATA
   ============================================================ */
function loadDay(dayId) {
  // Update week label
  const lbl = document.getElementById(dayId + '-wklabel');
  if (lbl) lbl.textContent = fmtWeek(currentWeekKey);

  const week = loadWeek(currentWeekKey);
  const day  = week[dayId] || freshDay();

  // Main tasks
  [0, 1, 2].forEach(i => {
    const cb  = document.getElementById(dayId + '-mc' + i);
    const inp = document.getElementById(dayId + '-mt' + i);
    if (!cb || !inp) return;
    inp.value = day.mainText[i] || '';
    cb.classList.toggle('on', !!day.mainChecked[i]);
    inp.classList.toggle('done', !!day.mainChecked[i]);
  });

  // Squire tasks
  [0, 1, 2].forEach(i => {
    const cb  = document.getElementById(dayId + '-sc' + i);
    const inp = document.getElementById(dayId + '-st' + i);
    if (!cb || !inp) return;
    inp.value = day.squireText[i] || '';
    cb.classList.toggle('on', !!day.squireChecked[i]);
    inp.classList.toggle('done', !!day.squireChecked[i]);
  });

  // Notes
  const notesEl = document.getElementById(dayId + '-notes');
  if (notesEl) notesEl.value = day.notes || '';

  // Trackers
  const gym  = document.getElementById(dayId + '-gym');
  const work = document.getElementById(dayId + '-work');
  if (gym)  gym.classList.toggle('on',  !!day.gym);
  if (work) work.classList.toggle('on', !!day.work);

  // Poem
  const poemEl = document.getElementById(dayId + '-poem');
  if (poemEl) poemEl.value = day.poem || '';
}

function flushDay(dayId) {
  if (!DAYS.includes(dayId)) return;

  const week = loadWeek(currentWeekKey);
  if (!week[dayId]) week[dayId] = freshDay();
  const day = week[dayId];

  [0, 1, 2].forEach(i => {
    const mt = document.getElementById(dayId + '-mt' + i);
    const st = document.getElementById(dayId + '-st' + i);
    if (mt) day.mainText[i]   = mt.value;
    if (st) day.squireText[i] = st.value;
  });

  const notesEl = document.getElementById(dayId + '-notes');
  if (notesEl) day.notes = notesEl.value;

  const poemEl = document.getElementById(dayId + '-poem');
  if (poemEl) day.poem = poemEl.value;

  saveWeek(currentWeekKey, week);
}

/* Debounced auto-save while typing */
let _saveTimer = null;
function queueSave(dayId) {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => flushDay(dayId), 700);
}

/* ============================================================
   TOGGLE HANDLERS
   ============================================================ */
function toggleTask(dayId, type, i) {
  const week = loadWeek(currentWeekKey);
  if (!week[dayId]) week[dayId] = freshDay();
  const day = week[dayId];

  const checkedKey = type === 'main' ? 'mainChecked' : 'squireChecked';
  day[checkedKey][i] = !day[checkedKey][i];
  saveWeek(currentWeekKey, week);

  const prefix = type === 'main' ? 'm' : 's';
  const cb  = document.getElementById(`${dayId}-${prefix}c${i}`);
  const inp = document.getElementById(`${dayId}-${prefix}t${i}`);
  if (cb)  cb.classList.toggle('on',   day[checkedKey][i]);
  if (inp) inp.classList.toggle('done', day[checkedKey][i]);
}

function toggleTracker(dayId, field) {
  const week = loadWeek(currentWeekKey);
  if (!week[dayId]) week[dayId] = freshDay();
  week[dayId][field] = !week[dayId][field];
  saveWeek(currentWeekKey, week);

  const el = document.getElementById(`${dayId}-${field}`);
  if (el) el.classList.toggle('on', week[dayId][field]);
}

/* ============================================================
   CALENDAR
   ============================================================ */
function renderCalendar() {
  const list = document.getElementById('cal-list');
  const todayKey  = mondayKey(new Date());
  const thisKey   = todayKey;

  // Collect all stored week keys
  const stored = new Set();
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('kt_week_')) stored.add(k.slice(8));
  }

  // Generate range: 16 weeks back + 6 weeks forward from today
  for (let n = -16; n <= 6; n++) {
    const d = keyToDate(todayKey);
    d.setDate(d.getDate() + n * 7);
    stored.add(d.toISOString().slice(0, 10));
  }

  // Sort newest first
  const weeks = [...stored].sort((a, b) => b.localeCompare(a));

  list.innerHTML = `<div class="cal-header">All Weeks</div>` +
    weeks.map(wk => {
      const isCurrent  = wk === thisKey;
      const isSelected = wk === currentWeekKey;
      const hasData    = !!localStorage.getItem('kt_week_' + wk);
      return `<div class="cal-week${isCurrent ? ' this-week' : ''}${isSelected ? ' selected' : ''}"
                   onclick="jumpToWeek('${wk}')">
        <div class="cal-week-label">${fmtWeek(wk)}${hasData ? ' ·' : ''}</div>
        <div class="cal-week-sub">${isCurrent ? '← Current Week  ' : ''}${isSelected ? '● Viewing' : ''}</div>
      </div>`;
    }).join('');
}

function jumpToWeek(wk) {
  currentWeekKey = wk;
  setWeekLabels();
  goScreen('menu', 'left');
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  // Build all day screen HTML once
  DAYS.forEach(buildDayScreen);

  // Set initial week display
  setWeekLabels();

  // Save on page hide (mobile back-button, tab close, etc.)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden' && DAYS.includes(currentScreen)) {
      clearTimeout(_saveTimer);
      flushDay(currentScreen);
    }
  });
  window.addEventListener('pagehide', () => {
    if (DAYS.includes(currentScreen)) flushDay(currentScreen);
  });
}

// Global error display — shows any crash on screen so we can debug from mobile
window.onerror = function(msg, src, line, col, err) {
  showError(msg + ' (line ' + line + ')');
};
window.onunhandledrejection = function(e) {
  showError(String(e.reason));
};
function showError(msg) {
  var el = document.getElementById('err-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'err-overlay';
    el.style.cssText = 'position:fixed;inset:0;background:#1a0000;color:#ff6666;font-family:monospace;font-size:13px;padding:30px 20px;z-index:9999;overflow-y:auto;white-space:pre-wrap;';
    document.body.appendChild(el);
  }
  el.textContent = '⚠️ KNIGHTLY TASKS ERROR\n\n' + msg + '\n\nIf you see this, screenshot it and send to Claude.';
}

try {
  init();
} catch(e) {
  showError(e.message + '\n' + e.stack);
}
</script>
